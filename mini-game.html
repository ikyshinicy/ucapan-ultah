<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Mini Game - Kumpulkan Bunga</title><style>*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(255,111,174,.28),transparent 34%),radial-gradient(circle at bottom right,rgba(255,209,102,.18),transparent 32%),linear-gradient(145deg,#080713,#111027 55%,#090816);color:#fff;overflow:hidden;user-select:none}.game-page{width:100vw;height:100vh;position:relative;overflow:hidden;padding:18px}.top-bar{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:20;width:min(92%,520px);display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(18px);box-shadow:0 18px 50px rgba(0,0,0,.28)}.stat{font-size:13px;color:rgba(255,255,255,.82);white-space:nowrap}.stat strong{color:#ffd166}.intro,.result{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(8,7,19,.72);backdrop-filter:blur(18px)}.panel{width:min(100%,420px);padding:28px 22px;border-radius:28px;text-align:center;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);box-shadow:0 24px 80px rgba(0,0,0,.45)}.badge{display:inline-block;padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#ffd166;margin-bottom:14px}h1{font-size:clamp(28px,8vw,42px);line-height:1.08;letter-spacing:-.04em;margin-bottom:14px}.panel p{color:rgba(255,255,255,.72);font-size:15px;line-height:1.65;margin-bottom:22px}button,.link-btn{border:0;border-radius:999px;padding:13px 20px;background:linear-gradient(135deg,#ff6fae,#ffd166);color:#1a1020;font-weight:800;font-size:14px;cursor:pointer;box-shadow:0 14px 34px rgba(255,111,174,.25);text-decoration:none;display:inline-block}.game-item{position:absolute;z-index:10;width:58px;height:58px;display:flex;align-items:center;justify-content:center;font-size:40px;border-radius:999px;cursor:pointer;touch-action:manipulation;animation:fall linear forwards;filter:drop-shadow(0 12px 18px rgba(0,0,0,.35))}.game-item.flower{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14)}.game-item.bad{background:rgba(255,80,80,.08);border:1px solid rgba(255,255,255,.10)}@keyframes fall{from{transform:translateY(-80px) rotate(0deg);opacity:0}10%{opacity:1}to{transform:translateY(calc(100vh + 100px)) rotate(220deg);opacity:1}}.pop-text{position:absolute;z-index:30;pointer-events:none;font-size:14px;font-weight:800;color:#ffd166;animation:popUp .75s ease forwards}@keyframes popUp{to{transform:translateY(-34px) scale(1.08);opacity:0}}.hidden{display:none!important}</style></head><body><main class="game-page" id="gamePage"><div class="top-bar"><div class="stat">Bunga: <strong id="score">0</strong>/<strong>20</strong></div><div class="stat">Nyawa: <strong id="lives">3</strong></div><div class="stat">Hindari: <strong>💩</strong></div></div><section class="intro" id="intro"><div class="panel"><div class="badge">Mini Game</div><h1>Kumpulkan Buket Bunga</h1><p>Ambil 20 buket bunga untuk membuka kejutan berikutnya. Tapi hati-hati, jangan sampai salah ambil 💩.</p><button id="startBtn">Mulai Main</button></div></section><section class="result hidden" id="result"><div class="panel"><div class="badge" id="resultBadge">Berhasil</div><h1 id="resultTitle">Bunga Terkumpul</h1><p id="resultText">Kamu berhasil mengumpulkan semua bunga.</p><button id="restartBtn">Main Lagi</button> <a class="link-btn" href="polaroid.html">Kembali</a></div></section></main><script>const TARGET_SCORE=20,MAX_LIVES=3,gamePage=document.getElementById("gamePage"),intro=document.getElementById("intro"),result=document.getElementById("result"),startBtn=document.getElementById("startBtn"),restartBtn=document.getElementById("restartBtn"),scoreEl=document.getElementById("score"),livesEl=document.getElementById("lives"),resultBadge=document.getElementById("resultBadge"),resultTitle=document.getElementById("resultTitle"),resultText=document.getElementById("resultText");let score=0,lives=MAX_LIVES,isPlaying=false,spawnTimer=null,speedUpTimer=null,spawnDelay=780,fallDuration=4200;startBtn.addEventListener("click",startGame);restartBtn.addEventListener("click",startGame);function startGame(){clearGameItems();score=0;lives=MAX_LIVES;isPlaying=true;spawnDelay=780;fallDuration=4200;updateStats();intro.classList.add("hidden");result.classList.add("hidden");spawnItem();spawnTimer=setInterval(spawnItem,spawnDelay);speedUpTimer=setInterval(()=>{if(!isPlaying)return;spawnDelay=Math.max(430,spawnDelay-55);fallDuration=Math.max(2500,fallDuration-170);clearInterval(spawnTimer);spawnTimer=setInterval(spawnItem,spawnDelay)},5000)}function spawnItem(){if(!isPlaying)return;const item=document.createElement("button"),isBad=Math.random()<.32;item.className="game-item "+(isBad?"bad":"flower");item.type="button";item.textContent=isBad?"💩":"💐";const x=Math.max(8,Math.random()*(window.innerWidth-74));item.style.left=x+"px";item.style.top="-70px";item.style.animationDuration=fallDuration+"ms";item.addEventListener("click",e=>{e.stopPropagation();const r=item.getBoundingClientRect();if(isBad){lives--;showPopText("Aduh -1 nyawa",r.left,r.top)}else{score++;showPopText("+1 bunga",r.left,r.top)}item.remove();updateStats();checkGameState()});item.addEventListener("animationend",()=>item.remove());gamePage.appendChild(item)}function updateStats(){scoreEl.textContent=score;livesEl.textContent=lives}function checkGameState(){if(score>=TARGET_SCORE)endGame(true);if(lives<=0)endGame(false)}function endGame(win){isPlaying=false;clearInterval(spawnTimer);clearInterval(speedUpTimer);clearGameItems();result.classList.remove("hidden");if(win){resultBadge.textContent="Berhasil";resultTitle.textContent="Bunga Terkumpul";resultText.textContent="Kamu berhasil mengumpulkan 20 buket bunga. Kejutan berikutnya sudah siap dibuka."}else{resultBadge.textContent="Coba Lagi";resultTitle.textContent="Ups, Kena Jebakan";resultText.textContent="Nyawamu habis karena terlalu banyak mengambil yang salah. Coba kumpulkan bunganya lagi."}}function clearGameItems(){document.querySelectorAll(".game-item,.pop-text").forEach(el=>el.remove())}function showPopText(text,x,y){const pop=document.createElement("div");pop.className="pop-text";pop.textContent=text;pop.style.left=x+"px";pop.style.top=y+"px";gamePage.appendChild(pop);setTimeout(()=>pop.remove(),760)}</script></body></html>
