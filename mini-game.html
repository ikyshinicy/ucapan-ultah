<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mini Game - Kumpulkan Bunga</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 111, 174, 0.28), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255, 209, 102, 0.18), transparent 32%),
        linear-gradient(145deg, #080713, #111027 55%, #090816);
      color: #fff;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .game-page {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      padding: 18px;
    }

    .top-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: min(92%, 520px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    .stat {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.82);
      white-space: nowrap;
    }

    .stat strong {
      color: #ffd166;
    }

    .intro,
    .result {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(8, 7, 19, 0.72);
      backdrop-filter: blur(18px);
    }

    .panel {
      width: min(100%, 420px);
      padding: 28px 22px;
      border-radius: 28px;
      text-align: center;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .badge {
      display: inline-block;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ffd166;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.08;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
    }

    .panel p {
      color: rgba(255, 255, 255, 0.72);
      font-size: 15px;
      line-height: 1.65;
      margin-bottom: 22px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 13px 20px;
      background: linear-gradient(135deg, #ff6fae, #ffd166);
      color: #1a1020;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 14px 34px rgba(255, 111, 174, 0.25);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .result-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .game-item {
      position: absolute;
      z-index: 10;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      border-radius: 999px;
      cursor: pointer;
      touch-action: manipulation;
      animation: fall linear forwards;
      filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.35));
      outline: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .game-item.flower {
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .game-item.bad {
      background: rgba(255, 80, 80, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    @keyframes fall {
      from {
        transform: translateY(-80px) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      to {
        transform: translateY(calc(100vh + 100px)) rotate(220deg);
        opacity: 1;
      }
    }

    .pop-text {
      position: absolute;
      z-index: 30;
      pointer-events: none;
      font-size: 14px;
      font-weight: 800;
      color: #ffd166;
      animation: popUp 0.75s ease forwards;
    }

    @keyframes popUp {
      from {
        transform: translateY(0) scale(0.9);
        opacity: 1;
      }

      to {
        transform: translateY(-34px) scale(1.08);
        opacity: 0;
      }
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 420px) {
      .top-bar {
        top: 12px;
        padding: 10px 12px;
      }

      .stat {
        font-size: 12px;
      }

      .game-item {
        width: 70px;
        height: 70px;
        font-size: 38px;
      }

      .panel {
        border-radius: 24px;
      }
    }
  </style>
</head>

<body>
  <main class="game-page" id="gamePage">
    <div class="top-bar">
      <div class="stat">Bunga: <strong id="score">0</strong>/<strong>20</strong></div>
      <div class="stat">Nyawa: <strong id="lives">3</strong></div>
      <div class="stat">Hindari: <strong>💩</strong></div>
    </div>

    <section class="intro" id="intro">
      <div class="panel">
        <div class="badge">Mini Game</div>
        <h1>Kumpulkan Buket Bunga</h1>
        <p>
          Ambil 20 buket bunga untuk membuka jalan berikutnya.
          Tapi hati-hati, jangan sampai salah ambil 💩.
        </p>
        <button id="startBtn">Mulai Main</button>
      </div>
    </section>

    <section class="result hidden" id="result">
      <div class="panel">
        <div class="badge" id="resultBadge">Berhasil</div>
        <h1 id="resultTitle">Bunga Terkumpul</h1>
        <p id="resultText">
          Kamu berhasil mengumpulkan semua bunga.
        </p>

        <div class="result-actions">
          <button id="restartBtn">Main Lagi</button>
          <button id="nextBtn" class="hidden">Lanjut</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const TARGET_SCORE = 20;
    const MAX_LIVES = 3;

    const gamePage = document.getElementById("gamePage");
    const intro = document.getElementById("intro");
    const result = document.getElementById("result");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const nextBtn = document.getElementById("nextBtn");

    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const resultBadge = document.getElementById("resultBadge");
    const resultTitle = document.getElementById("resultTitle");
    const resultText = document.getElementById("resultText");

    let score = 0;
    let lives = MAX_LIVES;
    let isPlaying = false;
    let spawnTimer = null;
    let speedUpTimer = null;
    let spawnDelay = 780;
    let fallDuration = 5000;

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", startGame);

    nextBtn.addEventListener("click", () => {
      window.location.href = "mini-game-follow-path.html";
    });

    function startGame() {
      clearGameItems();

      score = 0;
      lives = MAX_LIVES;
      isPlaying = true;
      spawnDelay = 780;
      fallDuration = 5000;

      updateStats();

      intro.classList.add("hidden");
      result.classList.add("hidden");
      nextBtn.classList.add("hidden");

      spawnItem();
      spawnTimer = setInterval(spawnItem, spawnDelay);

      speedUpTimer = setInterval(() => {
        if (!isPlaying) return;

        spawnDelay = Math.max(430, spawnDelay - 55);
        fallDuration = Math.max(3400, fallDuration - 120);

        clearInterval(spawnTimer);
        spawnTimer = setInterval(spawnItem, spawnDelay);
      }, 5000);
    }

    function spawnItem() {
      if (!isPlaying) return;

      const item = document.createElement("button");
      const isBad = Math.random() < 0.32;

      item.className = "game-item " + (isBad ? "bad" : "flower");
      item.type = "button";
      item.textContent = isBad ? "💩" : "💐";

      const size = 72;
      const safeWidth = window.innerWidth - size - 16;
      const x = Math.max(8, Math.random() * safeWidth);

      item.style.left = x + "px";
      item.style.top = "-70px";
      item.style.animationDuration = fallDuration + "ms";

      item.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();

        if (!isPlaying) return;
        if (item.dataset.clicked === "true") return;

        item.dataset.clicked = "true";

        const rect = item.getBoundingClientRect();

        if (isBad) {
          lives -= 1;
          showPopText("Aduh -1 nyawa", rect.left, rect.top);
        } else {
          score += 1;
          showPopText("+1 bunga", rect.left, rect.top);
        }

        item.remove();
        updateStats();
        checkGameState();
      });

      item.addEventListener("animationend", () => {
        item.remove();
      });

      gamePage.appendChild(item);
    }

    function updateStats() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
    }

    function checkGameState() {
      if (score >= TARGET_SCORE) {
        endGame(true);
      }

      if (lives <= 0) {
        endGame(false);
      }
    }

    function endGame(isWin) {
      isPlaying = false;
      clearInterval(spawnTimer);
      clearInterval(speedUpTimer);
      clearGameItems();

      result.classList.remove("hidden");

      if (isWin) {
        resultBadge.textContent = "Berhasil";
        resultTitle.textContent = "Bunga Terkumpul";
        resultText.textContent = "Kamu berhasil mengumpulkan 20 buket bunga. Jalan berikutnya sudah terbuka.";
        nextBtn.classList.remove("hidden");
      } else {
        resultBadge.textContent = "Coba Lagi";
        resultTitle.textContent = "Ups, Kena Jebakan";
        resultText.textContent = "Nyawamu habis karena terlalu banyak mengambil yang salah. Coba kumpulkan bunganya lagi.";
        nextBtn.classList.add("hidden");
      }
    }

    function clearGameItems() {
      document.querySelectorAll(".game-item, .pop-text").forEach((el) => el.remove());
    }

    function showPopText(text, x, y) {
      const pop = document.createElement("div");
      pop.className = "pop-text";
      pop.textContent = text;
      pop.style.left = x + "px";
      pop.style.top = y + "px";

      gamePage.appendChild(pop);

      setTimeout(() => {
        pop.remove();
      }, 760);
    }
  </script>
</body>
</html>
