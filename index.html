<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Private Access</title>

  <style>
    :root {
      --bg-main: #080713;
      --bg-card: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-soft: #c9c7d8;
      --accent: #ff6fae;
      --accent-2: #ffd166;
      --border-soft: rgba(255, 255, 255, 0.14);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(255, 111, 174, 0.28), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255, 209, 102, 0.18), transparent 32%),
        linear-gradient(145deg, #080713, #111027 55%, #090816);
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .glow {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: rgba(255, 111, 174, 0.22);
      filter: blur(60px);
      animation: floatGlow 6s ease-in-out infinite alternate;
    }

    .glow.one {
      top: 8%;
      left: 8%;
    }

    .glow.two {
      right: 8%;
      bottom: 10%;
      background: rgba(255, 209, 102, 0.16);
      animation-delay: 1.5s;
    }

    @keyframes floatGlow {
      from {
        transform: translateY(0) scale(1);
      }

      to {
        transform: translateY(-18px) scale(1.08);
      }
    }

    .card {
      width: min(100%, 460px);
      padding: 34px 24px;
      border-radius: 30px;
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-2);
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(30px, 8vw, 46px);
      line-height: 1.05;
      margin-bottom: 14px;
      letter-spacing: -0.04em;
    }

    .subtitle {
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.7;
      max-width: 340px;
      margin: 0 auto 28px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 26px;
    }

    .time-box {
      padding: 18px 12px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .time-box strong {
      display: block;
      font-size: clamp(30px, 10vw, 44px);
      line-height: 1;
      color: #fff;
      letter-spacing: -0.05em;
    }

    .time-box span {
      display: block;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .message {
      min-height: 24px;
      font-size: 14px;
      color: var(--accent-2);
    }

    .unlock-text {
      margin-top: 10px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 111, 174, 0.14);
      border: 1px solid rgba(255, 111, 174, 0.22);
      color: #fff;
      line-height: 1.6;
      font-size: 14px;
    }

    .admin-test-btn {
      margin-top: 22px;
      padding: 11px 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .admin-test-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
    }

    .login-form {
      margin-top: 22px;
      display: grid;
      gap: 12px;
      text-align: left;
    }

    .login-label {
      font-size: 12px;
      color: var(--text-soft);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .login-input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      outline: none;
      font: inherit;
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.36);
    }

    .login-input:focus {
      border-color: rgba(255, 209, 102, 0.55);
      box-shadow: 0 0 0 4px rgba(255, 209, 102, 0.08);
    }

    .login-btn {
      margin-top: 4px;
      width: 100%;
      padding: 14px 18px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff6fae, #ffd166);
      color: #1a1020;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 16px 38px rgba(255, 111, 174, 0.24);
    }

    .login-message {
      min-height: 20px;
      margin-top: 2px;
      font-size: 13px;
      color: #ffb3c7;
      text-align: center;
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 380px) {
      .card {
        padding: 30px 18px;
        border-radius: 26px;
      }

      .countdown {
        gap: 10px;
      }

      .time-box {
        padding: 16px 10px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="glow one"></div>
    <div class="glow two"></div>

    <section class="card">
      <div class="badge">Private Access</div>

      <h1 id="mainTitle">Sesuatu Sedang Menunggu</h1>

      <p class="subtitle" id="subtitle">
        Halaman ini belum bisa dibuka sekarang.
        Tunggu sampai waktunya tiba.
      </p>

      <div class="countdown" id="countdown">
        <div class="time-box">
          <strong id="days">00</strong>
          <span>Hari</span>
        </div>

        <div class="time-box">
          <strong id="hours">00</strong>
          <span>Jam</span>
        </div>

        <div class="time-box">
          <strong id="minutes">00</strong>
          <span>Menit</span>
        </div>

        <div class="time-box">
          <strong id="seconds">00</strong>
          <span>Detik</span>
        </div>
      </div>

      <p class="message" id="message">
        Kunci akan terbuka pada 20 Juni 2026.
      </p>

      <div class="unlock-text hidden" id="unlockText">
        Waktunya tiba. Pintu pertama sudah terbuka.
      </div>

      <form class="login-form hidden" id="loginForm">
        <div>
          <label class="login-label" for="usernameInput">Username</label>
          <input
            class="login-input"
            id="usernameInput"
            type="text"
            placeholder="Masukkan username"
            autocomplete="off"
          />
        </div>

        <div>
          <label class="login-label" for="passwordInput">Password</label>
          <input
            class="login-input"
            id="passwordInput"
            type="password"
            placeholder="Masukkan password"
            autocomplete="off"
          />
        </div>

        <button class="login-btn" type="submit">Masuk</button>
        <p class="login-message" id="loginMessage"></p>
      </form>

      <button class="admin-test-btn" id="adminTestBtn">
        Admin Test Login
      </button>
    </section>
  </main>

  <script>
    const targetDate = new Date("June 20, 2026 00:00:00").getTime();

    const validUsername = "admin";
    const validPassword = "20062026";

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    const countdownEl = document.getElementById("countdown");
    const messageEl = document.getElementById("message");
    const unlockTextEl = document.getElementById("unlockText");
    const adminTestBtn = document.getElementById("adminTestBtn");

    const mainTitle = document.getElementById("mainTitle");
    const subtitle = document.getElementById("subtitle");

    const loginForm = document.getElementById("loginForm");
    const usernameInput = document.getElementById("usernameInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginMessage = document.getElementById("loginMessage");

    let isUnlocked = false;

    function padNumber(number) {
      return String(number).padStart(2, "0");
    }

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        unlockCountdown();
        clearInterval(timer);
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      daysEl.textContent = padNumber(days);
      hoursEl.textContent = padNumber(hours);
      minutesEl.textContent = padNumber(minutes);
      secondsEl.textContent = padNumber(seconds);
    }

    function unlockCountdown() {
      if (isUnlocked) return;

      isUnlocked = true;

      daysEl.textContent = "00";
      hoursEl.textContent = "00";
      minutesEl.textContent = "00";
      secondsEl.textContent = "00";

      mainTitle.textContent = "Pintu Pertama Terbuka";
      subtitle.textContent = "Masukkan akses rahasia untuk melanjutkan perjalanan kecil ini.";
      messageEl.textContent = "Countdown selesai.";
      unlockTextEl.classList.remove("hidden");
      loginForm.classList.remove("hidden");

      adminTestBtn.textContent = "Unlocked";
      adminTestBtn.disabled = true;
      adminTestBtn.style.opacity = "0.45";

      setTimeout(() => {
        usernameInput.focus();
      }, 200);
    }

    function handleLogin(event) {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      if (username === validUsername && password === validPassword) {
        loginMessage.style.color = "#ffd166";
        loginMessage.textContent = "Akses diterima. Membuka game pertama...";

        setTimeout(() => {
          window.location.href = "mini-game.html";
        }, 700);
      } else {
        loginMessage.style.color = "#ffb3c7";
        loginMessage.textContent = "Username atau password salah.";
      }
    }

    adminTestBtn.addEventListener("click", () => {
      unlockCountdown();
      clearInterval(timer);
    });

    loginForm.addEventListener("submit", handleLogin);

    updateCountdown();
    const timer = setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
