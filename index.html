<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Access Countdown</title>
  <style>
    :root{--bg:#080713;--card:rgba(255,255,255,.08);--text:#fff;--soft:#c9c7d8;--accent:#ff6fae;--gold:#ffd166;--border:rgba(255,255,255,.14)}
    *{box-sizing:border-box;margin:0;padding:0} body{min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(255,111,174,.28),transparent 34%),radial-gradient(circle at bottom right,rgba(255,209,102,.18),transparent 32%),linear-gradient(145deg,#080713,#111027 55%,#090816);overflow-x:hidden}.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative}.glow{position:absolute;width:220px;height:220px;border-radius:999px;background:rgba(255,111,174,.22);filter:blur(60px);animation:floatGlow 6s ease-in-out infinite alternate}.glow.one{top:8%;left:8%}.glow.two{right:8%;bottom:10%;background:rgba(255,209,102,.16);animation-delay:1.5s}@keyframes floatGlow{to{transform:translateY(-18px) scale(1.08)}}.card{width:min(100%,460px);padding:34px 24px;border-radius:30px;background:var(--card);border:1px solid var(--border);box-shadow:0 24px 80px rgba(0,0,0,.45);backdrop-filter:blur(20px);text-align:center;position:relative;z-index:2}.badge{display:inline-flex;padding:8px 14px;border-radius:999px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);margin-bottom:20px}h1{font-size:clamp(30px,8vw,46px);line-height:1.05;margin-bottom:14px;letter-spacing:-.04em}.subtitle{color:var(--soft);font-size:15px;line-height:1.7;max-width:340px;margin:0 auto 28px}.countdown{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:26px}.time-box{padding:18px 12px;border-radius:22px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}.time-box strong{display:block;font-size:clamp(30px,10vw,44px);line-height:1;color:#fff;letter-spacing:-.05em}.time-box span{display:block;margin-top:8px;font-size:12px;color:var(--soft);text-transform:uppercase;letter-spacing:.12em}.message{min-height:24px;font-size:14px;color:var(--gold)}.hidden{display:none!important}.unlock-text{margin-top:10px;padding:14px;border-radius:18px;background:rgba(255,111,174,.14);border:1px solid rgba(255,111,174,.22);color:#fff;line-height:1.6;font-size:14px}.admin-test-btn,.next-btn{margin-top:22px;padding:11px 16px;border:1px solid rgba(255,255,255,.14);border-radius:999px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:.2s}.next-btn{display:inline-block;text-decoration:none;background:linear-gradient(135deg,#ff6fae,#ffd166);color:#1a1020;font-weight:800;border:0}.admin-test-btn:hover{background:rgba(255,255,255,.12);color:#fff}.login-box{margin-top:22px;display:grid;gap:10px}.login-box input{width:100%;padding:13px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;outline:none}.login-box button{padding:13px 16px;border:0;border-radius:999px;background:linear-gradient(135deg,#ff6fae,#ffd166);color:#1a1020;font-weight:800;cursor:pointer}.error{color:#ffb3c8;font-size:13px;min-height:20px}@media(max-width:380px){.card{padding:30px 18px;border-radius:26px}.countdown{gap:10px}.time-box{padding:16px 10px}}
  </style>
</head>
<body>
<main class="page"><div class="glow one"></div><div class="glow two"></div><section class="card"><div class="badge">Private Access</div><h1>Sesuatu Sedang Menunggu</h1><p class="subtitle">Halaman ini belum bisa dibuka sekarang. Tunggu sampai waktunya tiba.</p><div class="countdown" id="countdown"><div class="time-box"><strong id="days">00</strong><span>Hari</span></div><div class="time-box"><strong id="hours">00</strong><span>Jam</span></div><div class="time-box"><strong id="minutes">00</strong><span>Menit</span></div><div class="time-box"><strong id="seconds">00</strong><span>Detik</span></div></div><p class="message" id="message">Kunci akan terbuka pada 20 Juni 2026.</p><div class="unlock-text hidden" id="unlockText">Waktunya tiba. Pintu pertama sudah terbuka.</div><div class="login-box hidden" id="loginBox"><input id="username" placeholder="Username"><input id="password" type="password" placeholder="Password"><button id="loginBtn">Masuk</button><p class="error" id="errorText"></p></div><button class="admin-test-btn" id="adminTestBtn">Admin Test Login</button></section></main>
<script>
const targetDate=new Date("June 20, 2026 00:00:00").getTime();const daysEl=document.getElementById("days"),hoursEl=document.getElementById("hours"),minutesEl=document.getElementById("minutes"),secondsEl=document.getElementById("seconds"),messageEl=document.getElementById("message"),unlockTextEl=document.getElementById("unlockText"),adminTestBtn=document.getElementById("adminTestBtn"),loginBox=document.getElementById("loginBox"),loginBtn=document.getElementById("loginBtn"),errorText=document.getElementById("errorText");function padNumber(n){return String(n).padStart(2,"0")}function unlockCountdown(){daysEl.textContent=hoursEl.textContent=minutesEl.textContent=secondsEl.textContent="00";messageEl.textContent="Countdown selesai.";unlockTextEl.classList.remove("hidden");loginBox.classList.remove("hidden");clearInterval(timer)}function updateCountdown(){const d=targetDate-new Date().getTime();if(d<=0){unlockCountdown();return}daysEl.textContent=padNumber(Math.floor(d/(1000*60*60*24)));hoursEl.textContent=padNumber(Math.floor((d/(1000*60*60))%24));minutesEl.textContent=padNumber(Math.floor((d/(1000*60))%60));secondsEl.textContent=padNumber(Math.floor((d/1000)%60))}updateCountdown();const timer=setInterval(updateCountdown,1000);adminTestBtn.addEventListener("click",unlockCountdown);loginBtn.addEventListener("click",()=>{const u=document.getElementById("username").value.trim();const p=document.getElementById("password").value.trim();if(u==="admin"&&p==="20062026"){location.href="polaroid.html"}else{errorText.textContent="Username atau password salah."}});
</script>
</body></html>
